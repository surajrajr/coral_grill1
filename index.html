<!DOCTYPE html>
<html>
<head>
    <title>Coral Grill</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Foodie's Cafe</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#menu">Menu</a>
        <a href="#gallery">Gallery</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="home">
    <h2>Welcome</h2>
    <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=900" alt="Cafe">
    <p>Enjoy fresh and tasty food at Foodie's Cafe.</p>
</section>

<section id="about">
    <h2>About</h2>
    <p>We serve fresh food with quality ingredients and friendly service.</p>
</section>

<section id="menu">
    <h2>Menu</h2>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300">
        <h3>Burger</h3>
        <p>₹150</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=300">
        <h3>Pizza</h3>
        <p>₹250</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=300">
        <h3>Pasta</h3>
        <p>₹180</p>
    </div>
</section>

<section id="gallery">
    <h2>Gallery</h2>
    <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=250">
    <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=250">
    <img src="https://images.unsplash.com/photo-1514933651103-005eec06c04b?w=250">
</section>

<section id="contact">
    <h2>Contact</h2>
    <input type="text" placeholder="Name"><br>
    <input type="email" placeholder="Email"><br>
    <textarea placeholder="Message"></textarea><br>
    <button>Submit</button>
</section>

<footer>
    <p>© 2026 Foodie's Cafe</p>
</footer>

</body>
</html>
